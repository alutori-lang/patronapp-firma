<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Firma - PatronApp</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f0f4ff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
    .header{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .header .logo{font-size:20px;font-weight:800}
    .header .doc{font-size:12px;opacity:.8}
    .header .nome{font-size:14px;font-weight:700}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .doc-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#e2e8f0;min-height:0}
    .doc-scroll img{width:100%;display:block}
    .sign-area{flex-shrink:0;background:#fff;border-top:2px solid #2563eb;padding:8px 12px}
    .sign-label{font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
    canvas{width:100%;height:140px;border:2px dashed #cbd5e1;border-radius:10px;background:#fff;touch-action:none;cursor:crosshair;display:block}
    canvas.active{border-color:#2563eb;border-style:solid;background:#fafbff}
    .bottom{display:flex;gap:8px;margin-top:8px}
    .btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-align:center}
    .btn-clear{background:#f1f5f9;color:#64748b}
    .btn-sign{background:#059669;color:#fff;font-size:16px}
    .btn-sign:disabled{background:#94a3b8}
    .btn-sign.ready{animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
    .success{text-align:center;padding:40px 20px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .success h2{color:#059669;font-size:22px;margin-top:12px}
    .success p{color:#64748b;margin-top:8px;font-size:14px}
    .already{text-align:center;padding:40px 20px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .already h2{color:#2563eb;font-size:20px;margin-top:12px}
    .sending{text-align:center;padding:40px;font-size:16px;color:#2563eb;font-weight:700}
    .loading{text-align:center;padding:60px 20px;font-size:16px;color:#2563eb;font-weight:700}
    .error-page{text-align:center;padding:60px 20px}
    .error-page h2{color:#dc2626;font-size:20px;margin-top:12px}
    .error-page p{color:#64748b;margin-top:8px;font-size:14px}
    .no-doc-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#64748b;font-size:14px;gap:8px}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <div>
      <div class="nome" id="clienteNome">Caricamento...</div>
      <div class="doc" id="docNome"></div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="loading">Caricamento...</div>
  </div>

  <script>
    var SUPABASE_URL = 'https://phxasihantyrlgixirpu.supabase.co';
    var API_URL = SUPABASE_URL + '/functions/v1/firma';
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    var documentoUrl = null;

    if (!token) {
      document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Token mancante</h2><p>Link non valido</p></div>';
    } else {
      loadFirma();
    }

    async function loadFirma() {
      try {
        var r = await fetch(API_URL + '?token=' + encodeURIComponent(token), {
          headers: { 'Accept': 'application/json' }
        });
        if (!r.ok) {
          document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Richiesta non trovata</h2><p>Il link potrebbe essere scaduto</p></div>';
          return;
        }
        var data = await r.json();
        document.getElementById('clienteNome').textContent = data.cliente_nome || 'Cliente';
        document.getElementById('docNome').textContent = data.documento_nome || 'Documento';
        documentoUrl = data.documento_url || null;

        if (data.stato === 'signed') {
          document.getElementById('main').innerHTML = '<div class="already"><div style="font-size:56px">&#9989;</div><h2>Gia firmato</h2><p>Documento firmato il ' + (data.signed_at ? new Date(data.signed_at).toLocaleDateString('it-IT') : '') + '</p></div>';
          return;
        }

        renderPage();
      } catch (e) {
        document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Errore di connessione</h2><p>Riprova tra qualche istante</p></div>';
      }
    }

    function renderPage() {
      var docHtml = '';
      if (documentoUrl) {
        var isPdf = documentoUrl.toLowerCase().endsWith('.pdf');
        if (isPdf) {
          docHtml = '<div class="doc-scroll"><iframe src="' + documentoUrl + '#toolbar=0" style="width:100%;height:100%;border:none"></iframe></div>';
        } else {
          docHtml = '<div class="doc-scroll"><img id="docImg" src="' + documentoUrl + '"></div>';
        }
      } else {
        docHtml = '<div class="doc-scroll"><div class="no-doc-msg"><div style="font-size:48px;opacity:.5">&#128196;</div><div>Nessun documento allegato</div></div></div>';
      }

      document.getElementById('main').innerHTML =
        docHtml +
        '<div class="sign-area">' +
          '<div class="sign-label">&#9997;&#65039; Firma qui — verrà applicata sul documento</div>' +
          '<canvas id="c"></canvas>' +
          '<div class="bottom">' +
            '<button class="btn btn-clear" id="clearBtn">Cancella</button>' +
            '<button class="btn btn-sign" id="signBtn" disabled>FIRMA E INVIA</button>' +
          '</div>' +
        '</div>';

      var c = document.getElementById('c');
      var ctx = c.getContext('2d');
      var drawing = false, hasSigned = false;

      function resize() {
        var r = c.getBoundingClientRect();
        c.width = r.width * 2;
        c.height = r.height * 2;
        ctx.scale(2, 2);
        ctx.strokeStyle = '#00008B';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
      resize();

      function getPos(e) {
        var r = c.getBoundingClientRect();
        var t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - r.left, y: t.clientY - r.top };
      }

      function start(e) { e.preventDefault(); drawing = true; c.classList.add('active'); var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
      function move(e) { e.preventDefault(); if (!drawing) return; hasSigned = true; document.getElementById('signBtn').disabled = false; document.getElementById('signBtn').classList.add('ready'); var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
      function stop() { drawing = false; c.classList.remove('active'); }

      c.addEventListener('mousedown', start);
      c.addEventListener('mousemove', move);
      c.addEventListener('mouseup', stop);
      c.addEventListener('mouseleave', stop);
      c.addEventListener('touchstart', start, { passive: false });
      c.addEventListener('touchmove', move, { passive: false });
      c.addEventListener('touchend', stop);

      document.getElementById('clearBtn').onclick = function() {
        ctx.clearRect(0, 0, c.width, c.height);
        hasSigned = false;
        document.getElementById('signBtn').disabled = true;
        document.getElementById('signBtn').classList.remove('ready');
      };

      document.getElementById('signBtn').onclick = async function() {
        if (!hasSigned) return;
        this.disabled = true;
        this.textContent = 'Invio...';

        // Create final image: document + signature stamped at bottom
        var finalCanvas = document.createElement('canvas');
        var finalCtx = finalCanvas.getContext('2d');
        var docImg = document.getElementById('docImg');

        if (docImg && docImg.naturalWidth > 0) {
          // Document image + signature below
          var sigH = Math.round(docImg.naturalWidth * 0.15); // signature height = 15% of doc width
          finalCanvas.width = docImg.naturalWidth;
          finalCanvas.height = docImg.naturalHeight + sigH + 40;
          // White background
          finalCtx.fillStyle = '#ffffff';
          finalCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
          // Draw document
          finalCtx.drawImage(docImg, 0, 0);
          // Draw separator line
          finalCtx.strokeStyle = '#2563eb';
          finalCtx.lineWidth = 2;
          finalCtx.beginPath();
          finalCtx.moveTo(20, docImg.naturalHeight + 10);
          finalCtx.lineTo(finalCanvas.width - 20, docImg.naturalHeight + 10);
          finalCtx.stroke();
          // Draw "Firma:" label
          finalCtx.fillStyle = '#64748b';
          finalCtx.font = '14px sans-serif';
          finalCtx.fillText('Firma:', 20, docImg.naturalHeight + 30);
          // Draw signature
          finalCtx.drawImage(c, 20, docImg.naturalHeight + 20, finalCanvas.width - 40, sigH);
        } else {
          // No document - just signature
          finalCanvas.width = c.width;
          finalCanvas.height = c.height;
          finalCtx.fillStyle = '#ffffff';
          finalCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
          finalCtx.drawImage(c, 0, 0);
        }

        document.getElementById('main').innerHTML = '<div class="sending">&#9203; Salvataggio firma...</div>';
        try {
          var resp = await fetch(API_URL + '?token=' + encodeURIComponent(token), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, signature: finalCanvas.toDataURL('image/png') })
          });
          if (resp.ok) {
            document.getElementById('main').innerHTML = '<div class="success"><div style="font-size:64px">&#9989;</div><h2>Firma completata!</h2><p>Documento firmato con successo</p><p style="margin-top:16px;font-size:12px;color:#94a3b8">Puoi chiudere questa pagina</p></div>';
          } else {
            throw new Error('Errore');
          }
        } catch (e) {
          document.getElementById('main').innerHTML = '<div class="sending" style="color:#dc2626">&#10060; Errore. Ricarica la pagina e riprova.</div>';
        }
      };
    }
  </script>
</body>
</html>
