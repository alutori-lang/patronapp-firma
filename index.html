<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Firma - PatronApp</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f0f4ff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
    .header{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .header .logo{font-size:20px;font-weight:800}
    .header .doc{font-size:12px;opacity:.8}
    .header .nome{font-size:14px;font-weight:700}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .doc-container{flex:1;position:relative;overflow:auto;background:#e2e8f0;min-height:0;-webkit-overflow-scrolling:touch}
    .doc-inner{position:relative;min-height:100%}
    .doc-inner img{width:100%;display:block;pointer-events:none;user-select:none}
    .doc-inner iframe{width:100%;height:100%;border:none;pointer-events:none}
    .doc-inner canvas{position:absolute;top:0;left:0;width:100%;touch-action:pinch-zoom;cursor:crosshair;z-index:10}
    .no-doc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#64748b;font-size:14px;gap:8px;position:relative}
    .no-doc .icon{font-size:48px;opacity:.5}
    .no-doc canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;cursor:crosshair;z-index:10}
    .toolbar{flex-shrink:0;background:#fff;border-top:2px solid #2563eb;padding:8px 12px;display:flex;gap:8px;align-items:center}
    .toolbar .hint{flex:1;font-size:12px;color:#2563eb;font-weight:600}
    .btn{padding:14px 20px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-align:center}
    .btn-clear{background:#f1f5f9;color:#64748b}
    .btn-sign{background:#059669;color:#fff;font-size:16px;flex:1}
    .btn-sign:disabled{background:#94a3b8}
    .btn-sign.ready{animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
    .success{text-align:center;padding:40px 20px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .success h2{color:#059669;font-size:22px;margin-top:12px}
    .success p{color:#64748b;margin-top:8px;font-size:14px}
    .already{text-align:center;padding:40px 20px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .already h2{color:#2563eb;font-size:20px;margin-top:12px}
    .sending{text-align:center;padding:40px;font-size:16px;color:#2563eb;font-weight:700}
    .loading{text-align:center;padding:60px 20px;font-size:16px;color:#2563eb;font-weight:700}
    .error-page{text-align:center;padding:60px 20px}
    .error-page h2{color:#dc2626;font-size:20px;margin-top:12px}
    .error-page p{color:#64748b;margin-top:8px;font-size:14px}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <div>
      <div class="nome" id="clienteNome">Caricamento...</div>
      <div class="doc" id="docNome"></div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="loading">Caricamento...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://phxasihantyrlgixirpu.supabase.co';
    const API_URL = SUPABASE_URL + '/functions/v1/firma';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    let documentoUrl = null;

    if (!token) {
      document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Token mancante</h2><p>Link non valido</p></div>';
    } else {
      loadFirma();
    }

    async function loadFirma() {
      try {
        const r = await fetch(API_URL + '?token=' + encodeURIComponent(token), {
          headers: { 'Accept': 'application/json' }
        });
        if (!r.ok) {
          document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Richiesta non trovata</h2><p>Il link potrebbe essere scaduto</p></div>';
          return;
        }
        const data = await r.json();
        document.getElementById('clienteNome').textContent = data.cliente_nome || 'Cliente';
        document.getElementById('docNome').textContent = data.documento_nome || 'Documento';
        documentoUrl = data.documento_url || null;

        if (data.stato === 'signed') {
          document.getElementById('main').innerHTML = '<div class="already"><div style="font-size:56px">&#9989;</div><h2>Gia firmato</h2><p>Documento firmato il ' + (data.signed_at ? new Date(data.signed_at).toLocaleDateString('it-IT') : '') + '</p></div>';
          return;
        }

        renderSignaturePad();
      } catch (e) {
        document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Errore di connessione</h2><p>Riprova tra qualche istante</p></div>';
      }
    }

    function renderSignaturePad() {
      var docContent = '';
      if (documentoUrl) {
        var isPdf = documentoUrl.toLowerCase().endsWith('.pdf');
        if (isPdf) {
          docContent = '<img id="docImg" src="" style="display:none"><iframe id="docFrame" src="' + documentoUrl + '#toolbar=0&navpanes=0"></iframe>';
        } else {
          docContent = '<img id="docImg" src="' + documentoUrl + '">';
        }
      } else {
        docContent = '<div style="height:600px"></div>';
      }

      document.getElementById('main').innerHTML =
        '<div class="doc-container" id="docContainer">' +
          '<div class="doc-inner" id="docInner">' +
            docContent +
            '<canvas id="c"></canvas>' +
          '</div>' +
        '</div>' +
        '<div class="toolbar">' +
          '<div class="hint">&#9997;&#65039; Firma direttamente sul documento</div>' +
          '<button class="btn btn-clear" id="clearBtn">Cancella</button>' +
          '<button class="btn btn-sign" id="signBtn" disabled>FIRMA E INVIA</button>' +
        '</div>';

      const container = document.getElementById('docContainer');
      const inner = document.getElementById('docInner');
      const c = document.getElementById('c');
      const ctx = c.getContext('2d');
      let drawing = false, hasSigned = false;
      let scale = 2;

      function setupCanvas() {
        var w = inner.offsetWidth;
        var h = inner.offsetHeight;
        var img = document.getElementById('docImg');
        if (img && img.naturalHeight > 0) {
          h = Math.max(h, Math.round(img.naturalHeight * (w / img.naturalWidth)));
        }
        if (h < 600) h = 600;
        c.style.height = h + 'px';
        c.width = w * scale;
        c.height = h * scale;
        ctx.scale(scale, scale);
        ctx.strokeStyle = '#00008B';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }

      var img = document.getElementById('docImg');
      if (img && img.src && !img.complete) {
        img.onload = setupCanvas;
        setTimeout(setupCanvas, 1000);
      } else {
        setTimeout(setupCanvas, 300);
      }

      function getPos(e) {
        var t = e.touches ? e.touches[0] : e;
        var rect = c.getBoundingClientRect();
        // Account for CSS scaling vs canvas pixel size
        var cssW = rect.width;
        var cssH = rect.height;
        var x = t.clientX - rect.left;
        var y = t.clientY - rect.top;
        return { x: x, y: y };
      }

      // Mouse events - direct drawing
      c.addEventListener('mousedown', function(e) {
        e.preventDefault();
        drawing = true;
        var p = getPos(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      });
      c.addEventListener('mousemove', function(e) {
        e.preventDefault();
        if (!drawing) return;
        hasSigned = true;
        document.getElementById('signBtn').disabled = false;
        document.getElementById('signBtn').classList.add('ready');
        var p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      });
      c.addEventListener('mouseup', function(e) { drawing = false; });
      c.addEventListener('mouseleave', function(e) { drawing = false; });

      // Touch events - allow scroll with one finger, draw with touch
      var touchTimer = null;
      var isDrawingTouch = false;

      c.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
          // Start drawing immediately on touch
          e.preventDefault();
          isDrawingTouch = true;
          drawing = true;
          var p = getPos(e);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
        }
      }, { passive: false });

      c.addEventListener('touchmove', function(e) {
        if (!isDrawingTouch || !drawing) return;
        e.preventDefault();
        hasSigned = true;
        document.getElementById('signBtn').disabled = false;
        document.getElementById('signBtn').classList.add('ready');
        var p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }, { passive: false });

      c.addEventListener('touchend', function(e) {
        drawing = false;
        isDrawingTouch = false;
      });

      document.getElementById('clearBtn').onclick = function () {
        ctx.clearRect(0, 0, c.width, c.height);
        hasSigned = false;
        document.getElementById('signBtn').disabled = true;
        document.getElementById('signBtn').classList.remove('ready');
      };

      document.getElementById('signBtn').onclick = async function () {
        if (!hasSigned) return;
        this.disabled = true;
        this.textContent = 'Invio...';

        // Combine document image + signature into one image
        var finalCanvas = document.createElement('canvas');
        var finalCtx = finalCanvas.getContext('2d');
        var docImg = document.getElementById('docImg');

        if (docImg && docImg.naturalWidth > 0) {
          // Use original document resolution
          finalCanvas.width = docImg.naturalWidth;
          finalCanvas.height = docImg.naturalHeight;
          finalCtx.drawImage(docImg, 0, 0);
          // Scale signature to match document size
          finalCtx.drawImage(c, 0, 0, finalCanvas.width, finalCanvas.height);
        } else {
          finalCanvas.width = c.width;
          finalCanvas.height = c.height;
          finalCtx.fillStyle = '#ffffff';
          finalCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
          finalCtx.drawImage(c, 0, 0);
        }

        document.getElementById('main').innerHTML = '<div class="sending">&#9203; Salvataggio firma...</div>';
        try {
          var resp = await fetch(API_URL + '?token=' + encodeURIComponent(token), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, signature: finalCanvas.toDataURL('image/png') })
          });
          if (resp.ok) {
            document.getElementById('main').innerHTML = '<div class="success"><div style="font-size:64px">&#9989;</div><h2>Firma completata!</h2><p>Documento firmato con successo</p><p style="margin-top:16px;font-size:12px;color:#94a3b8">Puoi chiudere questa pagina</p></div>';
          } else {
            throw new Error('Errore');
          }
        } catch (e) {
          document.getElementById('main').innerHTML = '<div class="sending" style="color:#dc2626">&#10060; Errore. Ricarica la pagina e riprova.</div>';
        }
      };
    }
  </script>
</body>
</html>
