<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Firma - PatronApp</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f0f4ff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
    .header{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .header .logo{font-size:20px;font-weight:800}
    .header .doc{font-size:12px;opacity:.8}
    .header .nome{font-size:14px;font-weight:700}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .doc-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#e2e8f0;min-height:0}
    .doc-scroll img{width:100%;display:block}
    .action-bar{flex-shrink:0;background:#fff;border-top:2px solid #2563eb;padding:14px 16px 24px;text-align:center}
    .action-bar .info-text{font-size:12px;color:#64748b;margin-bottom:10px}
    .btn-firma{width:100%;padding:18px;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#059669,#047857);color:#fff;display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-firma:disabled{background:#94a3b8;cursor:not-allowed}
    .center-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:auto}
    .otp-display{font-size:40px;font-weight:900;letter-spacing:12px;color:#2563eb;background:#f0f4ff;padding:16px 32px;border-radius:16px;border:3px solid #2563eb;margin:16px 0}
    .otp-inputs{display:flex;gap:8px;justify-content:center;margin:16px 0}
    .otp-digit{width:48px;height:58px;text-align:center;font-size:26px;font-weight:800;border:2px solid #e2e8f0;border-radius:12px;outline:none;color:#0f172a}
    .otp-digit:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
    .otp-error{color:#dc2626;font-size:13px;min-height:18px;margin:8px 0}
    .btn-verify{width:100%;max-width:340px;padding:16px;border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#059669,#047857);color:#fff}
    .btn-verify:disabled{background:#94a3b8}
    .success{text-align:center;padding:40px 20px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .success h2{color:#059669;font-size:22px;margin-top:12px}
    .success p{color:#64748b;margin-top:8px;font-size:14px}
    .success .badge{display:inline-block;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:8px;padding:8px 16px;font-size:13px;color:#047857;font-weight:700;margin-top:14px}
    .already{text-align:center;padding:40px 20px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .already h2{color:#2563eb;font-size:20px;margin-top:12px}
    .loading{text-align:center;padding:60px 20px;font-size:16px;color:#2563eb;font-weight:700}
    .error-page{text-align:center;padding:60px 20px}
    .error-page h2{color:#dc2626;font-size:20px;margin-top:12px}
    .error-page p{color:#64748b;margin-top:8px;font-size:14px}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <div>
      <div class="nome" id="clienteNome">Caricamento...</div>
      <div class="doc" id="docNome"></div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="loading">Caricamento...</div>
  </div>

  <script>
    var SUPABASE_URL = 'https://phxasihantyrlgixirpu.supabase.co';
    var API_URL = SUPABASE_URL + '/functions/v1/firma';
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    var documentoUrl = null;
    var clienteNome = '';
    var docNome = '';

    if (!token) {
      document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Token mancante</h2><p>Link non valido</p></div>';
    } else {
      loadFirma();
    }

    async function loadFirma() {
      try {
        var r = await fetch(API_URL + '?token=' + encodeURIComponent(token), {
          headers: { 'Accept': 'application/json' }
        });
        if (!r.ok) {
          document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Richiesta non trovata</h2><p>Il link potrebbe essere scaduto</p></div>';
          return;
        }
        var data = await r.json();
        clienteNome = data.cliente_nome || 'Cliente';
        docNome = data.documento_nome || 'Documento';
        document.getElementById('clienteNome').textContent = clienteNome;
        document.getElementById('docNome').textContent = docNome;
        documentoUrl = data.documento_url || null;

        if (data.stato === 'signed') {
          document.getElementById('main').innerHTML = '<div class="already"><div style="font-size:56px">&#9989;</div><h2>Gia firmato</h2><p>Documento firmato il ' + (data.signed_at ? new Date(data.signed_at).toLocaleDateString('it-IT') : '') + '</p></div>';
          return;
        }

        renderPage();
      } catch (e) {
        document.getElementById('main').innerHTML = '<div class="error-page"><div style="font-size:56px">&#10060;</div><h2>Errore di connessione</h2><p>Riprova tra qualche istante</p></div>';
      }
    }

    function renderPage() {
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      var docHtml = '';
      if (documentoUrl) {
        var isPdf = documentoUrl.toLowerCase().endsWith('.pdf');
        if (isPdf) {
          if (isMobile) {
            docHtml = '<div class="doc-scroll"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:20px">' +
              '<div style="font-size:48px">&#128196;</div>' +
              '<div style="font-size:16px;font-weight:700;color:#0f172a;text-align:center">' + docNome + '</div>' +
              '<a href="' + documentoUrl + '" target="_blank" style="background:#2563eb;color:white;padding:12px 24px;border-radius:10px;font-weight:700;text-decoration:none;font-size:14px">Apri documento PDF</a>' +
              '</div></div>';
          } else {
            docHtml = '<div class="doc-scroll"><iframe src="' + documentoUrl + '#toolbar=0" style="width:100%;height:100%;border:none"></iframe></div>';
          }
        } else {
          docHtml = '<div class="doc-scroll"><img id="docImg" src="' + documentoUrl + '"></div>';
        }
      } else {
        docHtml = '<div class="doc-scroll"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;padding:20px"><div style="font-size:48px;opacity:.5">&#128196;</div><div style="font-size:16px;font-weight:700;color:#0f172a">' + docNome + '</div></div></div>';
      }

      document.getElementById('main').innerHTML =
        docHtml +
        '<div class="action-bar">' +
          '<div class="info-text">Conferma la tua identita per firmare questo documento</div>' +
          '<button class="btn-firma" id="signBtn">&#128274; CONFERMA E FIRMA</button>' +
        '</div>';

      document.getElementById('signBtn').onclick = async function() {
        this.disabled = true;
        this.innerHTML = '&#9203; Generazione codice...';

        try {
          var resp = await fetch(API_URL + '?token=' + encodeURIComponent(token), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'send_otp', token: token })
          });
          var result = await resp.json();

          if (result.status === 'otp_sent') {
            showOtpVerifyScreen(result.phone_masked);
          } else if (result.status === 'otp_generated') {
            showOtpVerifyScreen(null, result.otp_code);
          } else if (result.status === 'ok') {
            showSuccess(result.otp_verified);
          } else {
            throw new Error(result.message || 'Errore');
          }
        } catch (e) {
          this.disabled = false;
          this.innerHTML = '&#128274; CONFERMA E FIRMA';
          alert('Errore: ' + (e.message || 'Riprova'));
        }
      };
    }

    function showOtpVerifyScreen(phoneMasked, fallbackCode) {
      var headerHtml = '';
      if (phoneMasked) {
        // OTP sent via WhatsApp
        headerHtml =
          '<h2 style="font-size:20px;color:#0f172a;margin-bottom:6px">Inserisci il codice OTP</h2>' +
          '<p style="font-size:14px;color:#64748b;margin-bottom:4px">Abbiamo inviato un codice a 6 cifre su WhatsApp</p>' +
          '<p style="font-size:14px;color:#2563eb;font-weight:700;margin-bottom:16px">&#128241; ' + phoneMasked + '</p>';
      } else {
        // Fallback: show code on screen
        headerHtml =
          '<h2 style="font-size:20px;color:#0f172a;margin-bottom:6px">Codice di verifica</h2>' +
          '<p style="font-size:14px;color:#64748b;margin-bottom:4px">Comunica questo codice al cliente</p>' +
          '<div class="otp-display">' + fallbackCode + '</div>' +
          '<p style="font-size:13px;color:#64748b;margin-bottom:16px">Il cliente deve inserire il codice qui sotto</p>';
      }

      document.getElementById('main').innerHTML =
        '<div class="center-page">' +
          '<div style="font-size:48px;margin-bottom:12px">&#128272;</div>' +
          headerHtml +
          '<div class="otp-inputs" id="otpInputs">' +
            '<input type="tel" maxlength="1" class="otp-digit" autofocus>' +
            '<input type="tel" maxlength="1" class="otp-digit">' +
            '<input type="tel" maxlength="1" class="otp-digit">' +
            '<input type="tel" maxlength="1" class="otp-digit">' +
            '<input type="tel" maxlength="1" class="otp-digit">' +
            '<input type="tel" maxlength="1" class="otp-digit">' +
          '</div>' +
          '<div class="otp-error" id="otpError"></div>' +
          '<button class="btn-verify" id="verifyBtn" disabled>VERIFICA E FIRMA</button>' +
          '<p style="font-size:11px;color:#94a3b8;margin-top:12px">Il codice scade tra 10 minuti</p>' +
        '</div>';

      var digits = document.querySelectorAll('.otp-digit');
      digits[0].focus();

      digits.forEach(function(input, i) {
        input.addEventListener('input', function() {
          if (this.value.length === 1 && i < 5) digits[i + 1].focus();
          checkComplete();
        });
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && !this.value && i > 0) {
            digits[i - 1].focus();
            digits[i - 1].value = '';
          }
        });
        input.addEventListener('paste', function(e) {
          e.preventDefault();
          var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
          for (var j = 0; j < 6 && j < paste.length; j++) digits[j].value = paste[j];
          if (paste.length >= 6) digits[5].focus();
          checkComplete();
        });
      });

      function checkComplete() {
        var code = '';
        digits.forEach(function(d) { code += d.value; });
        document.getElementById('verifyBtn').disabled = code.length < 6;
      }

      document.getElementById('verifyBtn').onclick = async function() {
        var code = '';
        digits.forEach(function(d) { code += d.value; });
        if (code.length < 6) return;

        this.disabled = true;
        this.textContent = 'Verifica in corso...';
        document.getElementById('otpError').textContent = '';

        try {
          var resp = await fetch(API_URL + '?token=' + encodeURIComponent(token), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'verify_otp', token: token, otp_code: code })
          });
          var result = await resp.json();

          if (result.status === 'ok') {
            showSuccess(true);
          } else {
            document.getElementById('otpError').textContent = result.message || 'Codice errato';
            document.getElementById('verifyBtn').disabled = false;
            document.getElementById('verifyBtn').textContent = 'VERIFICA E FIRMA';
            digits.forEach(function(d) { d.value = ''; });
            digits[0].focus();
          }
        } catch (e) {
          document.getElementById('otpError').textContent = 'Errore di connessione. Riprova.';
          document.getElementById('verifyBtn').disabled = false;
          document.getElementById('verifyBtn').textContent = 'VERIFICA E FIRMA';
        }
      };
    }

    function showSuccess(otpVerified) {
      document.getElementById('main').innerHTML =
        '<div class="success">' +
          '<div style="font-size:64px">&#9989;</div>' +
          '<h2>Firma completata!</h2>' +
          '<p>Documento firmato con successo</p>' +
          (otpVerified ? '<div class="badge">&#128272; Verificato con codice OTP</div>' : '') +
          '<p style="margin-top:16px;font-size:12px;color:#94a3b8">Puoi chiudere questa pagina</p>' +
        '</div>';
    }
  </script>
</body>
</html>
